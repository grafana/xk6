name: Tooling Release

on:
  workflow_call:
    inputs:
      # #region inputs
      go-version:
        description: The go version to use for the build.
        required: true
        type: string
      goreleaser-version:
        description: The version of GoReleaser to use for builds and releases.
        required: true
        type: string
      k6-versions:
        description: The k6 versions to be used for integration tests. JSON string array (e.g. ["v0.57.0","v0.56.0"])
        required: false
        default: '["latest"]'
        type: string
      bats:
        description: The bats scripts to use for integration testing. Space-separated file names or patterns.
        type: string
        required: false
      # #endregion inputs

jobs:
  config:
    name: Config
    runs-on: ubuntu-latest
    outputs:
      docker: ${{steps.configure.outputs.docker}}
      gar: ${{steps.configure.outputs.gar}}
      ghcr-io: ${{steps.configure.outputs.ghcr-io}}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Configure
        id: configure
        run: |
          if yq -r '.dockers[].image_templates[]' .goreleaser.y*ml | grep -q ghcr.io ; then
            echo "docker=true" >> $GITHUB_OUTPUT
            echo "ghcr-io=true" >> $GITHUB_OUTPUT
          fi
          # GAR image templates reference the registry via the MIRROR_IMAGE
          # env var, so the literal registry host is not present in the
          # rendered template strings here -- match the env var instead.
          if yq -r '.dockers[].image_templates[]' .goreleaser.y*ml | grep -q MIRROR_IMAGE ; then
            echo "docker=true" >> $GITHUB_OUTPUT
            echo "gar=true" >> $GITHUB_OUTPUT
          fi
      - name: Summary
        env:
          REF_NAME: ${{ github.ref_name }}
          GO_VERSION: ${{ inputs.go-version }}
          GORELEASER_VERSION: ${{ inputs.goreleaser-version }}
          K6_VERSIONS: ${{ join(fromJSON(inputs.k6-versions),' ') }}
          GHCR_IO: ${{ steps.configure.outputs.ghcr-io }}
          GAR: ${{ steps.configure.outputs.gar }}
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<END

          ## ${REF_NAME}

          ### Configuration

          Description          | Value
          ---------------------|-----------------------------
          go version for build | ${GO_VERSION}
          GoReleaser version   | ${GORELEASER_VERSION}
          k6 versions for test | ${K6_VERSIONS}

          END

          if [ -n "${GHCR_IO}" ]; then
            echo "Push Docker image to ghcr.io" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -n "${GAR}" ]; then
            echo "Push Docker image to GAR (mirrored to docker.io/grafana)" >> $GITHUB_STEP_SUMMARY
          fi

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: ["config"]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run Gosec Security Scanner
        uses: securego/gosec@4a3bd8af174872c778439083ded7adbf3747e770 # v2.26.1
        with:
          args: ./...

      - name: Run Vulnerability Checker
        id: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-input: ${{inputs.go-version}}
          go-package: ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: ["config", "security"]
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go ${{ inputs.go-version }}
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "${{ inputs.go-version }}"
          check-latest: true
          cache: false

      - name: Set up QEMU
        if: ${{needs.config.outputs.docker == 'true'}}
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: "amd64,arm64"

      - name: Setup Bats
        if: ${{ inputs.bats != '' && runner.os == 'Linux' }}
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0
        with:
          bats-version: "1.13.0"
          support-install: false
          assert-install: false
          detik-install: false
          file-install: false

      - name: GoReleaser snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "${{ inputs.goreleaser-version }}"
          args: release --clean --snapshot

      - name: Integration Test
        if: ${{ inputs.bats != '' }}
        env:
          K6_VERSIONS: ${{ join(fromJSON(inputs.k6-versions),' ') }}
          BATS: ${{ inputs.bats }}
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<END

          ### Integration Test

          END

          set -e
          bats $BATS | tee -a $GITHUB_STEP_SUMMARY

      - name: Login to GAR
        if: ${{ needs.config.outputs.gar == 'true' }}
        uses: grafana/shared-workflows/actions/login-to-gar@1f541877ceb22c7be7667d8a8df04984aeac9f9d # login-to-gar/v1.0.3
        with:
          registry: us-docker.pkg.dev

      - name: Login to GitHub Packages
        if: ${{ needs.config.outputs.ghcr-io == 'true' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: GoReleaser release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "${{ inputs.goreleaser-version }}"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
